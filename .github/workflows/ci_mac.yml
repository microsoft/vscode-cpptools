name: CI (Mac)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  job:
    uses: ./.github/workflows/job-compile-and-test.yml
    with:
      runner-env: macos-14
      platform: mac
      yarn-args: --network-timeout 100000